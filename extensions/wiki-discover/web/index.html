<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wiki Discover</title>
    <link rel="stylesheet" href="/kit/theme.css" />
    <style>
      /* App shell: fixed top bar, scrolling middle, sticky action bar at the
         bottom so the rating controls are ALWAYS reachable regardless of how much
         article content (or how many images) there is. */
      body { padding: 0; }
      .wd-app { height: 100vh; display: flex; flex-direction: column; min-height: 0; }
      .wd-scroll { flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: 14px 16px 18px; }

      /* visually-hidden but available to assistive tech */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
      }

      .wd-topbar {
        flex: none;
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--ck-border);
        background: var(--ck-bg);
      }
      .wd-brand { display: flex; align-items: center; gap: 8px; }
      .wd-brand h1 { margin: 0; font-size: 17px; }

      /* ---- Tune your feed (one consolidated, collapsible panel) ------------- */
      .wd-tune { margin-bottom: 14px; }
      .wd-tunebar {
        width: 100%; font: inherit; cursor: pointer;
        display: flex; align-items: center; gap: 10px;
        background: var(--ck-bg-muted); color: var(--ck-fg);
        border: 1px solid var(--ck-border); border-radius: var(--ck-radius);
        padding: 9px 12px;
      }
      .wd-tunebar:hover { border-color: var(--ck-fg); }
      .wd-tunebar.is-open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
      .wd-tunebar .wd-tunelabel { display: flex; align-items: center; gap: 7px; font-weight: var(--ck-fw-semibold); }
      .wd-counts { display: flex; gap: 10px; align-items: center; }
      .wd-count { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }

      .wd-tune-body {
        border: 1px solid var(--ck-border); border-top: 0;
        border-radius: 0 0 var(--ck-radius) var(--ck-radius);
        padding: 12px; display: flex; flex-direction: column; gap: 12px;
      }
      .wd-field { display: flex; flex-direction: column; gap: 6px; }
      .wd-field-label { text-transform: uppercase; letter-spacing: 0.04em; }

      .wd-chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .wd-chip { padding-right: 4px; }
      .wd-chip-x {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 22px; min-height: 22px; /* comfortable tap target */
        border: 0; background: transparent; color: inherit; cursor: pointer;
        padding: 2px; margin-left: 2px; opacity: 0.7; border-radius: 999px;
      }
      .wd-chip-x:hover { opacity: 1; background: var(--ck-bg-inset); }
      .wd-pick { font: inherit; cursor: pointer; background: transparent; min-height: 28px; padding: 4px 10px; }
      .wd-pick:hover { border-color: var(--ck-fg); }
      .wd-catalog { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
      .wd-cat-label { margin-bottom: 4px; }
      .wd-tune-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      /* keep small buttons inside the tune panel at a comfortable tap height */
      .wd-tune-body .ck-btn-sm, .wd-tune-foot .ck-btn-sm { min-height: 28px; }

      /* ---- article (the focus) --------------------------------------------- */
      .wd-article { padding: 0; overflow: hidden; }

      /* header: consistent left-hand lead image (shown in full) + title/tags */
      .wd-head { display: flex; gap: 14px; align-items: flex-start; padding: 14px 16px 0; }
      .wd-lead {
        flex: 0 0 auto; width: 128px; height: 116px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--ck-border); border-radius: var(--ck-radius);
        overflow: hidden; background: var(--ck-bg-inset); color: var(--ck-muted);
      }
      /* white mat so transparent line-art / notation / diagrams stay legible */
      .wd-lead.has-img { background: #ffffff; }
      .wd-lead img { width: 100%; height: 100%; object-fit: contain; display: block; }
      .wd-headtext { flex: 1 1 auto; min-width: 0; }
      .wd-body { padding: 12px 16px 16px; }
      .wd-title { margin: 0 0 8px; font-size: 17px; line-height: 1.3; }
      .wd-title a { color: var(--ck-fg); }
      .wd-title a:hover { text-decoration: underline; }
      .wd-tags { display: flex; flex-wrap: wrap; gap: 6px; }
      .wd-extract { margin: 0; line-height: 1.55; }

      /* horizontal image strip — consistent frames, full image visible (contain).
         scroll-snap gives a clearer "there's more" affordance when scrolling. */
      .wd-gallery { display: flex; gap: 8px; overflow-x: auto; margin-top: 12px; padding-bottom: 6px; scrollbar-width: thin; scroll-snap-type: x proximity; }
      .wd-gimg {
        flex: 0 0 auto; width: 120px; height: 90px; scroll-snap-align: start;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--ck-border); border-radius: var(--ck-radius);
        overflow: hidden; background: #ffffff;
      }
      .wd-gimg img { width: 100%; height: 100%; object-fit: contain; display: block; }
      .wd-gimg:hover { border-color: var(--ck-fg); }
      .wd-gcount { margin-top: 6px; }

      /* ---- up next (flat list, not clickable-looking cards) ---------------- */
      .wd-next-head { margin: 16px 2px 8px; }
      .wd-next-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
      .wd-next-item {
        display: flex; justify-content: space-between; gap: 10px; align-items: baseline;
        padding: 7px 10px; background: var(--ck-bg-muted);
        border: 1px solid var(--ck-border-muted); border-radius: var(--ck-radius);
      }
      .wd-next-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .wd-next-desc { color: var(--ck-muted); font-weight: 400; }

      /* ---- sticky action bar ----------------------------------------------- */
      .wd-actionbar {
        flex: none; display: flex; align-items: center; gap: 8px;
        padding: 10px 12px;
        border-top: 1px solid var(--ck-border);
        background: var(--ck-bg-muted);
      }
      .wd-sentiment { flex: 1 1 0; justify-content: center; padding-top: 8px; padding-bottom: 8px; }
      .wd-sentiment:hover { border-color: var(--ck-fg); }
      .wd-ico-up { color: var(--ck-success); }
      .wd-ico-meh { color: var(--ck-attention); }
      .wd-ico-down { color: var(--ck-danger); }
    </style>
  </head>
  <body>
    <div id="app"><p class="ck-muted" style="padding:16px">Loading…</p></div>
    <script type="module" src="./app.mjs"></script>
  </body>
</html>
